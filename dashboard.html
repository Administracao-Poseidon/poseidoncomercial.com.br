<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poseidon Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0f2a;
            color: white;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(0,212,255,0.3);
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.5em;
            font-weight: bold;
            color: #00d4ff;
        }

        .device-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .device-selector select {
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            color: white;
            font-size: 1em;
            cursor: pointer;
        }

        .device-selector button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .device-selector button:hover {
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            padding: 8px 16px;
            border-radius: 8px;
            color: #e74c3c;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(231,76,60,0.4);
        }

        /* Container principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Status Cards */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .status-card:hover {
            transform: translateY(-5px);
        }

        .status-card .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .status-card .label {
            font-size: 0.9em;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .status-card .unit {
            font-size: 0.8em;
            color: #bdc3c7;
        }

        .status-card .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .badge-normal { background: #2ecc71; }
        .badge-warning { background: #e74c3c; }
        .badge-alert { background: #f39c12; }

        /* Gráficos */
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        canvas {
            max-height: 300px;
        }

        /* Controles */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }

        .control-panel h3 {
            color: #00d4ff;
            margin-bottom: 15px;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn.feed {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .control-btn.aux {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .control-btn.light {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: white;
        }

        .control-btn.active {
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
            transform: scale(1.05);
        }

        /* Schedule */
        .schedule-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .schedule-time {
            font-family: monospace;
            font-size: 1.2em;
        }

        .schedule-actions button {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            padding: 5px 10px;
            border-radius: 5px;
            color: #e74c3c;
            cursor: pointer;
            margin-left: 5px;
        }

        .add-schedule {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-schedule input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }

        .add-schedule button {
            padding: 10px 20px;
            background: #00d4ff;
            border: none;
            border-radius: 8px;
            color: #0a0f2a;
            cursor: pointer;
        }

        /* Online Status */
        .online-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #2ecc71;
        }

        .status-dot.offline {
            background: #e74c3c;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid rgba(0,212,255,0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            
            .status-grid {
                grid-template-columns: 1fr;
            }
            
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🌊 POSEIDON COMMERCIAL</div>
        <div class="device-selector">
            <select id="deviceSelect">
                <option value="">Selecione um dispositivo</option>
            </select>
            <button onclick="addDeviceModal()">+ Adicionar Dispositivo</button>
        </div>
        <div class="user-info">
            <span id="userName"></span>
            <div class="online-status">
                <div class="status-dot" id="deviceStatus"></div>
                <span id="deviceStatusText">Desconectado</span>
            </div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="container">
        <div id="dashboardContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando dados do dispositivo...</p>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Dispositivo -->
    <div id="addDeviceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#1a1f3a; padding:30px; border-radius:20px; max-width:500px; margin:20px;">
            <h3 style="margin-bottom:20px;">Adicionar Dispositivo</h3>
            <input type="text" id="newDeviceId" placeholder="ID do Dispositivo" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(255,255,255,0.1); border:1px solid #00d4ff; border-radius:8px; color:white;">
            <input type="text" id="newDeviceName" placeholder="Nome do Dispositivo (ex: Aquário Sala)" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(255,255,255,0.1); border:1px solid #00d4ff; border-radius:8px; color:white;">
            <div style="display:flex; gap:10px;">
                <button onclick="addDevice()" style="flex:1; padding:12px; background:#00d4ff; border:none; border-radius:8px; cursor:pointer;">Adicionar</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#e74c3c; border:none; border-radius:8px; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            databaseURL: "https://seu-projeto.firebaseio.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "seu-sender-id",
            appId: "seu-app-id"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;
        let currentDevice = null;
        let tempChart = null;
        let phChart = null;

        // Verificar autenticação
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUserData();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadUserData() {
            // Carregar perfil do usuário
            const profileRef = await database.ref(`users/${currentUser.uid}/profile`).once('value');
            const profile = profileRef.val();
            if (profile) {
                document.getElementById('userName').innerHTML = `👤 ${profile.name}`;
            }
            
            // Carregar dispositivos
            loadDevices();
        }

        async function loadDevices() {
            const devicesRef = await database.ref(`users/${currentUser.uid}/devices`).once('value');
            const devices = devicesRef.val();
            const select = document.getElementById('deviceSelect');
            
            select.innerHTML = '<option value="">Selecione um dispositivo</option>';
            
            if (devices) {
                Object.keys(devices).forEach(deviceId => {
                    const option = document.createElement('option');
                    option.value = deviceId;
                    option.textContent = devices[deviceId].name || deviceId;
                    select.appendChild(option);
                });
            }
        }

        document.getElementById('deviceSelect').addEventListener('change', async (e) => {
            const deviceId = e.target.value;
            if (deviceId) {
                currentDevice = deviceId;
                await loadDeviceData();
                startRealtimeUpdates();
            }
        });

        async function loadDeviceData() {
            if (!currentDevice) return;
            
            const dashboardContent = document.getElementById('dashboardContent');
            dashboardContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando dados do dispositivo ${currentDevice}...</p>
                </div>
            `;
            
            // Carregar dados básicos do dispositivo
            const deviceRef = await database.ref(`devices/${currentDevice}`).once('value');
            const deviceData = deviceRef.val();
            
            if (deviceData) {
                renderDashboard(deviceData);
            }
        }

        function renderDashboard(deviceData) {
            const sensors = deviceData.sensors || {};
            const status = deviceData.status || {};
            const online = deviceData.online || false;
            
            // Atualizar status online
            const statusDot = document.getElementById('deviceStatus');
            const statusText = document.getElementById('deviceStatusText');
            if (online) {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Online';
            } else {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            }
            
            const html = `
                <div class="status-grid">
                    <div class="status-card">
                        <div class="icon">🌡️</div>
                        <div class="label">TEMPERATURA</div>
                        <div class="value" id="tempValue">${(sensors.temperature || 0).toFixed(1)}</div>
                        <div class="unit">°C</div>
                        <div class="status-badge ${getTempBadge(sensors.temperature)}">${getTempStatus(sensors.temperature)}</div>
                    </div>
                    
                    <div class="status-card">
                        <div class="icon">🧪</div>
                        <div class="label">pH</div>
                        <div class="value" id="phValue">${(sensors.ph || 0).toFixed(2)}</div>
                        <div class="status-badge ${getPhBadge(sensors.ph)}">${getPhStatus(sensors.ph)}</div>
                    </div>
                    
                    <div class="status-card">
                        <div class="icon">💧</div>
                        <div class="label">TURBIDEZ</div>
                        <div class="value" id="turbValue">${(sensors.turbidity || 0).toFixed(0)}</div>
                        <div class="unit">%</div>
                        <div class="status-badge ${getTurbBadge(sensors.turbidity)}">${getTurbStatus(sensors.turbidity)}</div>
                    </div>
                    
                    <div class="status-card">
                        <div class="icon">💦</div>
                        <div class="label">NÍVEL DE ÁGUA</div>
                        <div class="value" id="levelValue">${sensors.water_level ? '✓ NORMAL' : '⚠️ MÍNIMO'}</div>
                        <div class="status-badge ${sensors.water_level ? 'badge-normal' : 'badge-warning'}">${sensors.water_level ? 'OK' : 'ALERTA'}</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title">📈 Histórico de Temperatura</div>
                    <canvas id="tempChart"></canvas>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title">📊 Histórico de pH</div>
                    <canvas id="phChart"></canvas>
                </div>
                
                <div class="controls-grid">
                    <div class="control-panel">
                        <h3>🐟 Alimentador Automático</h3>
                        <div class="control-buttons">
                            <button class="control-btn feed" onclick="manualFeed()">🍽️ Alimentar Agora</button>
                        </div>
                    </div>
                    
                    <div class="control-panel">
                        <h3>🔌 Controles Remotos</h3>
                        <div class="control-buttons">
                            <button class="control-btn aux ${status.aux_relay ? 'active' : ''}" onclick="toggleRelay('aux')">🔧 Auxiliar: ${status.aux_relay ? 'ON' : 'OFF'}</button>
                            <button class="control-btn light ${status.light_relay ? 'active' : ''}" onclick="toggleRelay('light')">💡 Iluminação: ${status.light_relay ? 'ON' : 'OFF'}</button>
                        </div>
                    </div>
                    
                    <div class="control-panel">
                        <h3>⏰ Programação do Alimentador</h3>
                        <div id="scheduleList" class="schedule-list"></div>
                        <div class="add-schedule">
                            <input type="time" id="scheduleTime" step="60">
                            <button onclick="addSchedule()">+ Adicionar</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            
            // Carregar histórico para gráficos
            loadHistoryData();
            
            // Carregar programação
            loadSchedule();
        }

        function getTempBadge(temp) {
            if (temp >= 24 && temp <= 28) return 'badge-normal';
            return 'badge-warning';
        }
        
        function getTempStatus(temp) {
            if (temp >= 24 && temp <= 28) return 'Ideal';
            if (temp < 24) return 'Muito Frio';
            return 'Muito Quente';
        }
        
        function getPhBadge(ph) {
            if (ph >= 6.5 && ph <= 7.5) return 'badge-normal';
            return 'badge-warning';
        }
        
        function getPhStatus(ph) {
            if (ph >= 6.5 && ph <= 7.5) return 'Ideal';
            if (ph < 6.5) return 'Ácido';
            return 'Alcalino';
        }
        
        function getTurbBadge(turb) {
            if (turb <= 30) return 'badge-normal';
            if (turb <= 60) return 'badge-warning';
            return 'badge-alert';
        }
        
        function getTurbStatus(turb) {
            if (turb <= 30) return 'Água Limpa';
            if (turb <= 60) return 'Água Turva';
            return 'Água Suja';
        }

        async function loadHistoryData() {
            const historyRef = await database.ref(`devices/${currentDevice}/history`).orderByKey().limitToLast(20).once('value');
            const history = historyRef.val();
            
            if (history) {
                const timestamps = [];
                const temps = [];
                const phs = [];
                
                Object.keys(history).sort().forEach(key => {
                    timestamps.push(new Date(parseInt(key)).toLocaleTimeString());
                    temps.push(history[key].temp || 0);
                    phs.push(history[key].ph || 0);
                });
                
                createCharts(timestamps, temps, phs);
            }
        }

        function createCharts(labels, temps, phs) {
            const tempCtx = document.getElementById('tempChart').getContext('2d');
            const phCtx = document.getElementById('phChart').getContext('2d');
            
            if (tempChart) tempChart.destroy();
            if (phChart) phChart.destroy();
            
            tempChart = new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Temperatura (°C)',
                        data: temps,
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0,212,255,0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    }
                }
            });
            
            phChart = new Chart(phCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'pH',
                        data: phs,
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46,204,113,0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    }
                }
            });
        }

        function startRealtimeUpdates() {
            if (!currentDevice) return;
            
            // Listeners para atualizações em tempo real
            const sensorRef = database.ref(`devices/${currentDevice}/sensors`);
            sensorRef.off();
            sensorRef.on('value', (snapshot) => {
                const sensors = snapshot.val();
                if (sensors && document.getElementById('tempValue')) {
                    document.getElementById('tempValue').innerHTML = (sensors.temperature || 0).toFixed(1);
                    document.getElementById('phValue').innerHTML = (sensors.ph || 0).toFixed(2);
                    document.getElementById('turbValue').innerHTML = (sensors.turbidity || 0).toFixed(0);
                    document.getElementById('levelValue').innerHTML = sensors.water_level ? '✓ NORMAL' : '⚠️ MÍNIMO';
                }
            });
            
            const statusRef = database.ref(`devices/${currentDevice}/status`);
            statusRef.off();
            statusRef.on('value', (snapshot) => {
                const status = snapshot.val();
                if (status) {
                    const auxBtn = document.querySelector('.control-btn.aux');
                    const lightBtn = document.querySelector('.control-btn.light');
                    if (auxBtn) auxBtn.innerHTML = `🔧 Auxiliar: ${status.aux_relay ? 'ON' : 'OFF'}`;
                    if (lightBtn) lightBtn.innerHTML = `💡 Iluminação: ${status.light_relay ? 'ON' : 'OFF'}`;
                    if (auxBtn && status.aux_relay) auxBtn.classList.add('active');
                    else if (auxBtn) auxBtn.classList.remove('active');
                    if (lightBtn && status.light_relay) lightBtn.classList.add('active');
                    else if (lightBtn) lightBtn.classList.remove('active');
                }
            });
            
            const onlineRef = database.ref(`devices/${currentDevice}/online`);
            onlineRef.off();
            onlineRef.on('value', (snapshot) => {
                const online = snapshot.val();
                const statusDot = document.getElementById('deviceStatus');
                const statusText = document.getElementById('deviceStatusText');
                if (online) {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = 'Online';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Offline';
                }
            });
        }

        async function loadSchedule() {
            const scheduleRef = await database.ref(`devices/${currentDevice}/schedule`).once('value');
            const schedules = scheduleRef.val() || [];
            
            let html = '';
            schedules.forEach((sch, index) => {
                if (sch) {
                    html += `
                        <div class="schedule-item">
                            <div class="schedule-time">⏰ ${sch.hora.toString().padStart(2,'0')}:${sch.minuto.toString().padStart(2,'0')}</div>
                            <div class="schedule-actions">
                                <button onclick="removeSchedule(${index})">Remover</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            document.getElementById('scheduleList').innerHTML = html || '<p>Nenhum horário programado</p>';
        }

        function manualFeed() {
            database.ref(`devices/${currentDevice}/commands/manual_feed`).set(true);
            alert('Comando enviado! O alimentador será acionado em alguns segundos.');
        }
        
        function toggleRelay(type) {
            const path = `devices/${currentDevice}/commands/${type}_relay`;
            database.ref(path).once('value', (snapshot) => {
                const currentState = snapshot.val();
                database.ref(path).set(!currentState);
            });
        }
        
        function addSchedule() {
            const timeInput = document.getElementById('scheduleTime').value;
            if (timeInput) {
                const [hora, minuto] = timeInput.split(':');
                const scheduleRef = database.ref(`devices/${currentDevice}/schedule`);
                scheduleRef.once('value', (snapshot) => {
                    let schedules = snapshot.val() || [];
                    schedules.push({hora: parseInt(hora), minuto: parseInt(minuto), ativo: true});
                    scheduleRef.set(schedules);
                    document.getElementById('scheduleTime').value = '';
                    loadSchedule();
                });
            } else {
                alert('Selecione um horário');
            }
        }
        
        function removeSchedule(index) {
            const scheduleRef = database.ref(`devices/${currentDevice}/schedule`);
            scheduleRef.once('value', (snapshot) => {
                let schedules = snapshot.val() || [];
                schedules.splice(index, 1);
                scheduleRef.set(schedules);
                loadSchedule();
            });
        }

        function addDeviceModal() {
            document.getElementById('addDeviceModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('addDeviceModal').style.display = 'none';
        }
        
        async function addDevice() {
            const deviceId = document.getElementById('newDeviceId').value.trim();
            const deviceName = document.getElementById('newDeviceName').value.trim();
            
            if (!deviceId) {
                alert('Digite o ID do dispositivo');
                return;
            }
            
            try {
                // Verificar se dispositivo existe
                const deviceCheck = await database.ref(`devices/${deviceId}`).once('value');
                
                if (deviceCheck.exists()) {
                    // Adicionar ao usuário
                    await database.ref(`users/${currentUser.uid}/devices/${deviceId}`).set({
                        name: deviceName || "Meu Aquário",
                        added_at: Date.now(),
                        active: true
                    });
                    
                    // Adicionar permissão
                    await database.ref(`devices/${deviceId}/permissions/${currentUser.uid}`).set({
                        role: "user",
                        granted_at: Date.now()
                    });
                    
                    alert('Dispositivo adicionado com sucesso!');
                    closeModal();
                    loadDevices();
                } else {
                    alert('Dispositivo não encontrado. Verifique o ID e tente novamente.');
                }
            } catch (error) {
                alert('Erro ao adicionar dispositivo: ' + error.message);
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>

<div id="aquavibes-panel">
    <h2>🌊 AquaVibes - Poseidon</h2>
    <div id="status-remoto">
        Temperatura: <span id="rtemp">--</span>°C |
        pH: <span id="rph">--</span> |
        Turbidez: <span id="rturb">--</span>% |
        Nível: <span id="rnivel">--</span>
    </div>
    <button onclick="cmdAlimentador()">🍽️ Alimentar</button>
    <button onclick="cmdAux()">🔧 Auxiliar</button>
    <button onclick="cmdIlum()">💡 Iluminação</button>
</div>

<script>
setInterval(() => {
    fetch('get_status.php')
        .then(r => r.json())
        .then(d => {
            document.getElementById('rtemp').innerText = d.temp;
            document.getElementById('rph').innerText = d.ph;
            document.getElementById('rturb').innerText = d.turbidez;
            document.getElementById('rnivel').innerText = d.nivel ? 'Normal' : 'MÍNIMO';
        });
}, 3000);

function cmdAlimentador() {
    fetch('send_command.php', {method:'POST', body:'cmd=feed'});
}
</script>
